<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
    <!-- Platform Base (Solid Inner Layer) -->
    <g stroke="#FF6F47" stroke-width="2" stroke-linejoin="round">
        <!-- Base Right -->
        <path d="M 400 330 L 620 220 L 620 240 L 400 350 Z" fill="#F2744E"/>
        <!-- Base Left -->
        <path d="M 180 220 L 400 330 L 400 350 L 180 240 Z" fill="#FF9E80"/>
        <!-- Base Top -->
        <path d="M 400 110 L 620 220 L 400 330 L 180 220 Z" fill="#FFDFCA"/>
    </g>

    <!-- Platform Glass (Transparent Outer Layer) -->
    <g stroke="#FF6F47" stroke-width="2" stroke-linejoin="round">
        <!-- Glass Right -->
        <path d="M 400 340 L 660 210 L 660 240 L 400 370 Z" fill="none"/>
        <!-- Glass Left -->
        <path d="M 140 210 L 400 340 L 400 370 L 140 240 Z" fill="none"/>
        <!-- Glass Top -->
        <path d="M 400 80 L 660 210 L 400 340 L 140 210 Z" fill="#FFF4ED" fill-opacity="0.8"/>
    </g>

    <!-- Network Connecting Lines -->
    <g stroke="#FF6F47" stroke-width="0.8" fill="none">
        <line x1="390" y1="145" x2="340" y2="170"/>
        <line x1="390" y1="145" x2="440" y2="170"/>
        <line x1="390" y1="145" x2="390" y2="195"/>
        <line x1="340" y1="170" x2="290" y2="195"/>
        <line x1="340" y1="170" x2="350" y2="210"/>
        <line x1="440" y1="170" x2="390" y2="195"/>
        <line x1="440" y1="170" x2="460" y2="205"/>
        <line x1="290" y1="195" x2="320" y2="245"/>
        <line x1="350" y1="210" x2="320" y2="245"/>
        <line x1="350" y1="210" x2="360" y2="265"/>
        <line x1="350" y1="210" x2="400" y2="245"/>
        <line x1="390" y1="195" x2="350" y2="210"/>
        <line x1="390" y1="195" x2="460" y2="205"/>
        <line x1="390" y1="195" x2="400" y2="245"/>
        <line x1="460" y1="205" x2="520" y2="225"/>
        <line x1="460" y1="205" x2="440" y2="265"/>
        <line x1="460" y1="205" x2="500" y2="255"/>
        <line x1="520" y1="225" x2="500" y2="255"/>
        <line x1="320" y1="245" x2="360" y2="265"/>
        <line x1="360" y1="265" x2="400" y2="290"/>
        <line x1="400" y1="245" x2="360" y2="265"/>
        <line x1="400" y1="245" x2="440" y2="265"/>
        <line x1="400" y1="245" x2="400" y2="290"/>
        <line x1="440" y1="265" x2="400" y2="290"/>
        <line x1="500" y1="255" x2="440" y2="265"/>
    </g>

    <!-- Labels and Label Lines -->
    <g stroke="#FF6F47" stroke-width="0.8">
        <!-- Label 1: DEPENDS ON -->
        <line x1="340" y1="170" x2="325" y2="150" fill="none"/>
        <path d="M 260 152 L 315 125 L 323 129 L 268 156 Z" fill="#FFF4ED" stroke-linejoin="round"/>
        <text x="291" y="142" font-family="sans-serif" font-size="6.5" font-weight="bold" fill="#FF6F47" stroke="none" text-anchor="middle" dominant-baseline="central" transform="rotate(-26.5 291 142)">DEPENDS ON</text>

        <!-- Label 2: PART OF -->
        <line x1="460" y1="205" x2="475" y2="190" fill="none"/>
        <path d="M 475 180 L 515 200 L 505 205 L 465 185 Z" fill="#FFF4ED" stroke-linejoin="round"/>
        <text x="490" y="192" font-family="sans-serif" font-size="6.5" font-weight="bold" fill="#FF6F47" stroke="none" text-anchor="middle" dominant-baseline="central" transform="rotate(26.5 490 192)">PART OF</text>

        <!-- Label 3: PART OF -->
        <line x1="440" y1="265" x2="455" y2="280" fill="none"/>
        <path d="M 455 275 L 495 295 L 485 300 L 445 280 Z" fill="#FFF4ED" stroke-linejoin="round"/>
        <text x="470" y="287" font-family="sans-serif" font-size="6.5" font-weight="bold" fill="#FF6F47" stroke="none" text-anchor="middle" dominant-baseline="central" transform="rotate(26.5 470 287)">PART OF</text>
    </g>

    <!-- Network Nodes -->
    <g fill="#FFFFFF" stroke="#FF6F47" stroke-width="1.2">
        <!-- Node Attachments (Magnifying Glass / Keyhole details) -->
        <g stroke-width="0.8">
            <path d="M -4.5 -4.5 L -8 -8 L -5 -11 L -1.5 -7.5 Z" transform="translate(350, 210)"/>
            <path d="M -4.5 -4.5 L -8 -8 L -5 -11 L -1.5 -7.5 Z" transform="translate(390, 195)"/>
            <path d="M -4.5 -4.5 L -8 -8 L -5 -11 L -1.5 -7.5 Z" transform="translate(460, 205)"/>
            <path d="M -4.5 -4.5 L -8 -8 L -5 -11 L -1.5 -7.5 Z" transform="translate(400, 245)"/>
            <path d="M -4.5 -4.5 L -8 -8 L -5 -11 L -1.5 -7.5 Z" transform="translate(440, 265)"/>
        </g>

        <!-- Double Circles -->
        <circle cx="390" cy="145" r="8"/>
        <circle cx="390" cy="145" r="4"/>
        
        <circle cx="290" cy="195" r="8"/>
        <circle cx="290" cy="195" r="4"/>
        
        <circle cx="520" cy="225" r="8"/>
        <circle cx="520" cy="225" r="4"/>
        
        <circle cx="500" cy="255" r="8"/>
        <circle cx="500" cy="255" r="4"/>
        
        <circle cx="400" cy="290" r="8"/>
        <circle cx="400" cy="290" r="4"/>

        <!-- Single Circles -->
        <circle cx="340" cy="170" r="7"/>
        <circle cx="440" cy="170" r="7"/>
        <circle cx="350" cy="210" r="7"/>
        <circle cx="390" cy="195" r="7"/>
        <circle cx="460" cy="205" r="7"/>
        <circle cx="320" cy="245" r="7"/>
        <circle cx="360" cy="265" r="7"/>
        <circle cx="400" cy="245" r="7"/>
        <circle cx="440" cy="265" r="7"/>
    </g>
</svg>