<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .line { fill: none; stroke: #555; stroke-width: 0.8; stroke-linecap: round; stroke-linejoin: round; }
      .screen-bg { fill: #f5f5f5; stroke: #555; stroke-width: 0.8; stroke-linejoin: round; }
      .screen-border { fill: none; stroke: #555; stroke-width: 1.2; stroke-linejoin: round; }
      .orange { fill: #FF6F47; }
      .orange-line { fill: none; stroke: #FF6F47; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
      .dark { fill: #272727; }
      .text { fill: #272727; font-family: sans-serif; font-size: 8px; }
      .text-bold { fill: #272727; font-family: sans-serif; font-size: 10px; font-weight: bold; }
      .text-small { fill: #272727; font-family: sans-serif; font-size: 6px; }
      .person-skin { fill: #f0d0c0; stroke: #555; stroke-width: 0.8; }
      .person-shirt-orange { fill: #FF6F47; stroke: #555; stroke-width: 0.8; }
      .person-shirt-grey { fill: #d0d0d0; stroke: #555; stroke-width: 0.8; }
      .person-pants { fill: #888; stroke: #555; stroke-width: 0.8; }
      .person-hair { fill: #555; }
      .shadow { fill: rgba(0,0,0,0.05); }
    </style>
  </defs>

  <!-- Main Left Screen (Error Inspector) -->
  <g transform="translate(80, 60)">
