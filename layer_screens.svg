      <line x1="30" y1="200" x2="230" y2="80" />
      <line x1="30" y1="220" x2="230" y2="100" />
      <line x1="30" y1="240" x2="230" y2="120" />
      <line x1="30" y1="260" x2="230" y2="140" />
      <line x1="30" y1="280" x2="230" y2="160" />
      <line x1="30" y1="300" x2="230" y2="180" />
      
      <line x1="70" y1="155" x2="70" y2="275" />
      <line x1="110" y1="130" x2="110" y2="250" />
      <line x1="150" y1="105" x2="150" y2="225" />
