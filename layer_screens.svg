<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Window 1: Bar Chart -->
  <g transform="translate(50, 70)" filter="url(#shadow)">
    <rect width="240" height="190" rx="6" fill="#fff"/>
    <path d="M0 6 C0 2.686 2.686 0 6 0 h 228 C 237.314 0 240 2.686 240 6 v 24 h -240 z" fill="#e5e7eb"/>
    <line x1="0" y1="30" x2="240" y2="30" stroke="#aaa" stroke-width="1"/>
    <rect width="240" height="190" rx="6" fill="none" stroke="#aaa" stroke-width="1"/>
    <circle cx="16" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <circle cx="32" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <circle cx="48" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    
    <!-- Chart Content -->
    <path d="M 30 50 L 30 160 L 210 160" fill="none" stroke="#aaa" stroke-width="1" stroke-linecap="square"/>
    
    <!-- Y-axis ticks & labels (simulated) -->
    <line x1="27" y1="50" x2="30" y2="50" stroke="#aaa" stroke-width="1"/>
    <text x="22" y="53" font-family="sans-serif" font-size="6" fill="#888" text-anchor="end">30</text>
    <line x1="27" y1="72" x2="30" y2="72" stroke="#aaa" stroke-width="1"/>
    <text x="22" y="75" font-family="sans-serif" font-size="6" fill="#888" text-anchor="end">25</text>
    <line x1="27" y1="94" x2="30" y2="94" stroke="#aaa" stroke-width="1"/>
    <text x="22" y="97" font-family="sans-serif" font-size="6" fill="#888" text-anchor="end">20</text>
    <line x1="27" y1="116" x2="30" y2="116" stroke="#aaa" stroke-width="1"/>
    <text x="22" y="119" font-family="sans-serif" font-size="6" fill="#888" text-anchor="end">15</text>
    <line x1="27" y1="138" x2="30" y2="138" stroke="#aaa" stroke-width="1"/>
    <text x="22" y="141" font-family="sans-serif" font-size="6" fill="#888" text-anchor="end">10</text>

    <!-- X-axis ticks & labels -->
    <line x1="54" y1="160" x2="54" y2="163" stroke="#aaa" stroke-width="1"/>
    <text x="54" y="172" font-family="sans-serif" font-size="6" fill="#888" text-anchor="middle">U</text>
    <line x1="86" y1="160" x2="86" y2="163" stroke="#aaa" stroke-width="1"/>
    <text x="86" y="172" font-family="sans-serif" font-size="6" fill="#888" text-anchor="middle">2</text>
    <line x1="118" y1="160" x2="118" y2="163" stroke="#aaa" stroke-width="1"/>
    <text x="118" y="172" font-family="sans-serif" font-size="6" fill="#888" text-anchor="middle">O</text>
    <line x1="150" y1="160" x2="150" y2="163" stroke="#aaa" stroke-width="1"/>
    <text x="150" y="172" font-family="sans-serif" font-size="6" fill="#888" text-anchor="middle">M</text>
    <line x1="182" y1="160" x2="182" y2="163" stroke="#aaa" stroke-width="1"/>
    <text x="182" y="172" font-family="sans-serif" font-size="6" fill="#888" text-anchor="middle">10</text>

    <!-- Bars -->
    <rect x="46" y="125" width="16" height="35" fill="#FF6F47"/>
    <rect x="78" y="110" width="16" height="50" fill="#FF6F47"/>
    <rect x="110" y="95" width="16" height="65" fill="#FF6F47"/>
    <rect x="142" y="75" width="16" height="85" fill="#FF6F47"/>
    <rect x="174" y="45" width="16" height="115" fill="#FF6F47"/>
  </g>

  <!-- Window 2: Node Graph -->
  <g transform="translate(380, 100)" filter="url(#shadow)">
    <rect width="240" height="190" rx="6" fill="#fff"/>
    <path d="M0 6 C0 2.686 2.686 0 6 0 h 228 C 237.314 0 240 2.686 240 6 v 24 h -240 z" fill="#e5e7eb"/>
    <line x1="0" y1="30" x2="240" y2="30" stroke="#aaa" stroke-width="1"/>
    <rect width="240" height="190" rx="6" fill="none" stroke="#aaa" stroke-width="1"/>
    <circle cx="16" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <circle cx="32" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <circle cx="48" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    
    <!-- Graph Content -->
    <!-- Connections -->
    <path d="M 100 60 L 110 105 M 100 60 L 65 110 M 100 60 L 145 75 M 110 105 L 65 110 M 110 105 L 80 145 M 110 105 L 125 135 M 110 105 L 145 75 M 110 105 L 160 120 M 65 110 L 80 145 M 80 145 L 125 135 M 125 135 L 135 155 M 125 135 L 160 120 M 145 75 L 160 120" stroke="#ccc" stroke-width="1" fill="none"/>
    
    <!-- Nodes -->
    <circle cx="100" cy="60" r="8" fill="#FF6F47" opacity="0.3"/>
    <circle cx="100" cy="60" r="4" fill="#FF6F47"/>
    
    <circle cx="110" cy="105" r="8" fill="#FF6F47" opacity="0.3"/>
    <circle cx="110" cy="105" r="4" fill="#FF6F47"/>
    
    <circle cx="65" cy="110" r="8" fill="#FF6F47" opacity="0.3"/>
    <circle cx="65" cy="110" r="4" fill="#FF6F47"/>
    
    <circle cx="80" cy="145" r="8" fill="#FF6F47" opacity="0.3"/>
    <circle cx="80" cy="145" r="4" fill="#FF6F47"/>
    
    <circle cx="135" cy="155" r="8" fill="#FF6F47" opacity="0.3"/>
    <circle cx="135" cy="155" r="4" fill="#FF6F47"/>
    
    <circle cx="160" cy="120" r="8" fill="#FF6F47" opacity="0.3"/>
    <circle cx="160" cy="120" r="4" fill="#FF6F47"/>
    
    <circle cx="145" cy="75" r="6" fill="#FF6F47" opacity="0.3"/>
    <circle cx="145" cy="75" r="3" fill="#FF6F47"/>
    
    <circle cx="125" cy="135" r="8" fill="#FF6F47" opacity="0.3"/>
    <circle cx="125" cy="135" r="4" fill="#FF6F47"/>
  </g>

  <!-- Window 3: Data Table -->
  <g transform="translate(190, 210)" filter="url(#shadow)">
    <rect width="260" height="190" rx="6" fill="#fff"/>
    <path d="M0 6 C0 2.686 2.686 0 6 0 h 248 C 257.314 0 260 2.686 260 6 v 24 h -260 z" fill="#e5e7eb"/>
    <line x1="0" y1="30" x2="260" y2="30" stroke="#aaa" stroke-width="1"/>
    <rect width="260" height="190" rx="6" fill="none" stroke="#aaa" stroke-width="1"/>
    <circle cx="16" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <circle cx="32" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <circle cx="48" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    
    <!-- Table Content -->
    <rect x="20" y="50" width="220" height="20" fill="#f4f5f7"/>
    <rect x="20" y="50" width="220" height="120" fill="none" stroke="#ccc" stroke-width="1"/>
    
    <!-- Horizontal Lines -->
    <line x1="20" y1="70" x2="240" y2="70" stroke="#ccc" stroke-width="1"/>
    <line x1="20" y1="90" x2="240" y2="90" stroke="#ccc" stroke-width="1"/>
    <line x1="20" y1="110" x2="240" y2="110" stroke="#ccc" stroke-width="1"/>
    <line x1="20" y1="130" x2="240" y2="130" stroke="#ccc" stroke-width="1"/>
    <line x1="20" y1="150" x2="240" y2="150" stroke="#ccc" stroke-width="1"/>
    
    <!-- Vertical Lines -->
    <line x1="45" y1="50" x2="45" y2="170" stroke="#ccc" stroke-width="1"/>
    <line x1="160" y1="50" x2="160" y2="170" stroke="#ccc" stroke-width="1"/>
    <line x1="200" y1="50" x2="200" y2="170" stroke="#ccc" stroke-width="1"/>
    
    <!-- Checkboxes -->
    <rect x="26" y="75" width="10" height="10" fill="none" stroke="#aaa" stroke-width="1"/>
    <rect x="26" y="95" width="10" height="10" fill="none" stroke="#aaa" stroke-width="1"/>
    <rect x="26" y="115" width="10" height="10" fill="none" stroke="#aaa" stroke-width="1"/>
    <rect x="26" y="135" width="10" height="10" fill="none" stroke="#aaa" stroke-width="1"/>
    <rect x="26" y="155" width="10" height="10" fill="none" stroke="#aaa" stroke-width="1"/>
    
    <!-- Checkmarks -->
    <path d="M 28 100 L 31 103 L 36 96" fill="none" stroke="#FF6F47" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 28 120 L 31 123 L 36 116" fill="none" stroke="#FF6F47" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Text Lines -->
    <rect x="55" y="76" width="60" height="3" fill="#999" rx="1.5"/>
    <rect x="55" y="84" width="40" height="2" fill="#ccc" rx="1"/>
    
    <rect x="55" y="96" width="50" height="3" fill="#999" rx="1.5"/>
    <rect x="55" y="104" width="70" height="2" fill="#ccc" rx="1"/>
    
    <rect x="55" y="116" width="45" height="3" fill="#999" rx="1.5"/>
    <rect x="55" y="124" width="55" height="2" fill="#ccc" rx="1"/>
    
    <rect x="55" y="136" width="65" height="3" fill="#999" rx="1.5"/>
    <rect x="55" y="144" width="35" height="2" fill="#ccc" rx="1"/>
    
    <rect x="55" y="156" width="50" height="3" fill="#999" rx="1.5"/>
    <rect x="55" y="164" width="60" height="2" fill="#ccc" rx="1"/>
  </g>

  <!-- Window 4: Chat Bubbles -->
  <g transform="translate(510, 250)" filter="url(#shadow)">
    <rect width="240" height="170" rx="6" fill="#fff"/>
    <path d="M0 6 C0 2.686 2.686 0 6 0 h 228 C 237.314 0 240 2.686 240 6 v 24 h -240 z" fill="#e5e7eb"/>
    <line x1="0" y1="30" x2="240" y2="30" stroke="#aaa" stroke-width="1"/>
    <rect width="240" height="170" rx="6" fill="none" stroke="#aaa" stroke-width="1"/>
    <circle cx="16" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <circle cx="32" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <circle cx="48" cy="15" r="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
    
    <!-- Chat Content -->
    <!-- Bubble 1 (Orange) -->
    <path d="M 24 50 H 86 A 4 4 0 0 1 90 54 V 86 A 4 4 0 0 1 86 90 H 40 L 28 102 L 32 90 H 24 A 4 4 0 0 1 20 86 V 54 A 4 4 0 0 1 24 50 Z" fill="#FF6F47"/>
    <rect x="30" y="62" width="45" height="3" fill="#fff" rx="1.5"/>
    <rect x="30" y="72" width="25" height="3" fill="#fff" rx="1.5"/>
    
    <!-- Bubble 2 (White) -->
    <path d="M 104 60 H 176 A 4 4 0 0 1 180 64 V 96 A 4 4 0 0 1 176 100 H 172 L 172 112 L 156 100 H 104 A 4 4 0 0 1 100 96 V 64 A 4 4 0 0 1 104 60 Z" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <rect x="110" y="72" width="55" height="3" fill="#888" rx="1.5"/>
    <rect x="110" y="82" width="35" height="3" fill="#888" rx="1.5"/>
    
    <!-- Bubble 3 (White) -->
    <path d="M 124 110 H 196 A 4 4 0 0 1 200 114 V 146 A 4 4 0 0 1 196 150 H 192 L 192 162 L 176 150 H 124 A 4 4 0 0 1 120 146 V 114 A 4 4 0 0 1 124 110 Z" fill="#fff" stroke="#aaa" stroke-width="1"/>
    <rect x="130" y="122" width="55" height="3" fill="#888" rx="1.5"/>
    <rect x="130" y="132" width="40" height="3" fill="#888" rx="1.5"/>
  </g>
</svg>