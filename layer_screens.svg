    <text class="text-small" transform="matrix(0.866, -0.5, 0.866, 0.5, 75, 335)">2023-10-27 14:00 Auth Failed</text>
    <text class="text-small" transform="matrix(0.866, -0.5, 0.866, 0.5, 85, 340)">2023-10-27 14:15:23 - Payment Timeout</text>
    <text class="text-small" transform="matrix(0.866, -0.5, 0.866, 0.5, 95, 345)">2023-10-27 - Gateway Timeout</text>
    
