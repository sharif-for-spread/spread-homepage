<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="100%" height="100%">
  <defs>
    <!-- Person Template -->
    <g id="person">
      <ellipse cx="0" cy="-18" rx="4.5" ry="5.5" fill="#555"/>
      <path d="M -5.5,-10 L 5.5,-10 L 4.5,6 L -4.5,6 Z" fill="#555"/>
      <rect x="-3.5" y="6" width="2.5" height="9" rx="1" fill="#555"/>
      <rect x="1" y="6" width="2.5" height="9" rx="1" fill="#555"/>
    </g>
  </defs>

  <!-- Shadows -->
  <polygon points="100,300 273.2,200 288.2,208 115,308" fill="#000" opacity="0.06"/>
  <polygon points="380,380 587.8,260 602.8,268 395,388" fill="#000" opacity="0.06"/>
  <polygon points="660,400 833.2,300 848.2,308 675,408" fill="#000" opacity="0.06"/>
  <polygon points="450,550 588.6,470 603.6,478 465,558" fill="#000" opacity="0.06"/>

  <!-- Connector Pipes -->
  <path d="M 187,250 C 187,360 400,380 460,415" fill="none" stroke="#ccc" stroke-width="4" stroke-linecap="round"/>
  <path d="M 484,320 C 484,360 519,340 519,380" fill="none" stroke="#ccc" stroke-width="4" stroke-linecap="round"/>
  <path d="M 747,350 C 747,410 650,340 570,360" fill="none" stroke="#ccc" stroke-width="4" stroke-linecap="round"/>
  <path d="M 519,510 C 519,540 550,550 550,580" fill="none" stroke="#ccc" stroke-width="4" stroke-linecap="round"/>

  <!-- ========================================== -->
  <!-- WINDOW 1: Error Inspector (Top-Left)       -->
  <!-- ========================================== -->
  <g id="window-error-inspector">
    <!-- Casing Top -->
    <polygon points="100,150 273.2,50 261.2,43 88,143" fill="#e8e8e8" stroke="#888" stroke-width="1" stroke-linejoin="round"/>
    <!-- Casing Left -->
    <polygon points="100,150 88,143 88,293 100,300" fill="#d8d8d8" stroke="#888" stroke-width="1" stroke-linejoin="round"/>
    
    <!-- Front Face -->
    <g transform="matrix(0.866, -0.5, 0, 1, 100, 150)">
      <rect width="200" height="150" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1"/>
      <!-- Header -->
      <path d="M0,4 Q0,0 4,0 L196,0 Q200,0 200,4 L200,22 L0,22 Z" fill="#e8e8e8"/>
      <line x1="0" y1="22" x2="200" y2="22" stroke="#888" stroke-width="1"/>
      <circle cx="12" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <circle cx="22" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <circle cx="32" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <text x="45" y="15" font-family="sans-serif" font-size="10" fill="#272727" font-weight="bold">Error Inspector</text>
      
      <!-- Content: Status Bars -->
      <text x="12" y="46" font-family="sans-serif" font-size="7" fill="#888">SYS-01</text>
      <rect x="48" y="40" width="130" height="8" rx="2" fill="#FF6F47"/>
      
      <text x="12" y="64" font-family="sans-serif" font-size="7" fill="#888">DB-ERR</text>
      <rect x="48" y="58" width="80" height="8" rx="2" fill="#E53935"/>
      
      <text x="12" y="82" font-family="sans-serif" font-size="7" fill="#888">NET-04</text>
      <rect x="48" y="76" width="110" height="8" rx="2" fill="#FF6F47"/>
      
      <text x="12" y="100" font-family="sans-serif" font-size="7" fill="#888">AUTH-2</text>
      <rect x="48" y="94" width="40" height="8" rx="2" fill="#E53935"/>
      
      <text x="12" y="118" font-family="sans-serif" font-size="7" fill="#888">MEM-01</text>
      <rect x="48" y="112" width="140" height="8" rx="2" fill="#FF6F47"/>
      
      <text x="12" y="136" font-family="sans-serif" font-size="7" fill="#888">API-99</text>
      <rect x="48" y="130" width="95" height="8" rx="2" fill="#FF6F47"/>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- WINDOW 2: Product Explorer (Top-Center)    -->
  <!-- ========================================== -->
  <g id="window-product-explorer">
    <!-- Casing Top -->
    <polygon points="380,200 587.8,80 575.8,73 368,193" fill="#e8e8e8" stroke="#888" stroke-width="1" stroke-linejoin="round"/>
    <!-- Casing Left -->
    <polygon points="380,200 368,193 368,373 380,380" fill="#d8d8d8" stroke="#888" stroke-width="1" stroke-linejoin="round"/>
    
    <!-- Front Face -->
    <g transform="matrix(0.866, -0.5, 0, 1, 380, 200)">
      <rect width="240" height="180" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1"/>
      <!-- Header -->
      <path d="M0,4 Q0,0 4,0 L236,0 Q240,0 240,4 L240,22 L0,22 Z" fill="#e8e8e8"/>
      <line x1="0" y1="22" x2="240" y2="22" stroke="#888" stroke-width="1"/>
      <circle cx="12" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <circle cx="22" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <circle cx="32" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <text x="45" y="15" font-family="sans-serif" font-size="10" fill="#272727" font-weight="bold">Product Explorer</text>
      
      <!-- Content: Network Graph -->
      <!-- Lines -->
      <line x1="120" y1="90" x2="60" y2="50" stroke="#aaa" stroke-width="1"/>
      <line x1="120" y1="90" x2="180" y2="60" stroke="#aaa" stroke-width="1"/>
      <line x1="120" y1="90" x2="50" y2="120" stroke="#aaa" stroke-width="1"/>
      <line x1="120" y1="90" x2="110" y2="150" stroke="#aaa" stroke-width="1"/>
      <line x1="120" y1="90" x2="190" y2="130" stroke="#aaa" stroke-width="1"/>
      <line x1="60" y1="50" x2="50" y2="120" stroke="#aaa" stroke-width="1"/>
      <line x1="180" y1="60" x2="190" y2="130" stroke="#aaa" stroke-width="1"/>
      <line x1="180" y1="60" x2="150" y2="40" stroke="#aaa" stroke-width="1"/>
      <line x1="190" y1="130" x2="210" y2="90" stroke="#aaa" stroke-width="1"/>
      <line x1="180" y1="60" x2="210" y2="90" stroke="#aaa" stroke-width="1"/>
      <line x1="50" y1="120" x2="110" y2="150" stroke="#aaa" stroke-width="1"/>
      
      <!-- Nodes -->
      <circle cx="120" cy="90" r="8" fill="#FF6F47" stroke="#fff" stroke-width="2"/>
      <circle cx="60" cy="50" r="6" fill="#FF6F47" stroke="#fff" stroke-width="2"/>
      <circle cx="180" cy="60" r="6" fill="#FF6F47" stroke="#fff" stroke-width="2"/>
      <circle cx="50" cy="120" r="6" fill="#FF6F47" stroke="#fff" stroke-width="2"/>
      <circle cx="110" cy="150" r="6" fill="#FF6F47" stroke="#fff" stroke-width="2"/>
      <circle cx="190" cy="130" r="6" fill="#FF6F47" stroke="#fff" stroke-width="2"/>
      <circle cx="150" cy="40" r="5" fill="#FF6F47" stroke="#fff" stroke-width="1.5"/>
      <circle cx="210" cy="90" r="5" fill="#FF6F47" stroke="#fff" stroke-width="1.5"/>
      
      <!-- Labels -->
      <g transform="translate(165, 35)">
        <rect width="45" height="14" fill="#fff" stroke="#888" stroke-width="0.5"/>
        <text x="4" y="10" font-family="sans-serif" font-size="7" fill="#272727">Module A</text>
      </g>
      <g transform="translate(125, 95)">
        <rect width="35" height="14" fill="#fff" stroke="#888" stroke-width="0.5"/>
        <text x="6" y="10" font-family="sans-serif" font-size="7" fill="#272727">Core</text>
      </g>
      <g transform="translate(30, 130)">
        <rect width="40" height="14" fill="#fff" stroke="#888" stroke-width="0.5"/>
        <text x="4" y="10" font-family="sans-serif" font-size="7" fill="#272727">Network</text>
      </g>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- WINDOW 3: Requirements Manager (Top-Right) -->
  <!-- ========================================== -->
  <g id="window-requirements">
    <!-- Casing Top -->
    <polygon points="660,250 833.2,150 821.2,143 648,243" fill="#e8e8e8" stroke="#888" stroke-width="1" stroke-linejoin="round"/>
    <!-- Casing Left -->
    <polygon points="660,250 648,243 648,393 660,400" fill="#d8d8d8" stroke="#888" stroke-width="1" stroke-linejoin="round"/>
    
    <!-- Front Face -->
    <g transform="matrix(0.866, -0.5, 0, 1, 660, 250)">
      <rect width="200" height="150" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1"/>
      <!-- Header -->
      <path d="M0,4 Q0,0 4,0 L196,0 Q200,0 200,4 L200,22 L0,22 Z" fill="#e8e8e8"/>
      <line x1="0" y1="22" x2="200" y2="22" stroke="#888" stroke-width="1"/>
      <circle cx="12" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <circle cx="22" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <circle cx="32" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <text x="45" y="15" font-family="sans-serif" font-size="10" fill="#272727" font-weight="bold">Requirements</text>
      
      <!-- Content: Data Table -->
      <text x="10" y="35" font-family="sans-serif" font-size="7" fill="#888" font-weight="bold">STAT</text>
      <text x="35" y="35" font-family="sans-serif" font-size="7" fill="#888" font-weight="bold">ID</text>
      <text x="70" y="35" font-family="sans-serif" font-size="7" fill="#888" font-weight="bold">DESCRIPTION</text>
      
      <!-- Row 1 -->
      <line x1="5" y1="40" x2="195" y2="40" stroke="#ddd" stroke-width="1"/>
      <path d="M 12,48 L 15,51 L 20,45" fill="none" stroke="#FF6F47" stroke-width="1.5"/>
      <rect x="35" y="46" width="20" height="4" fill="#ccc" rx="1"/>
      <rect x="70" y="46" width="90" height="4" fill="#ccc" rx="1"/>
      
      <!-- Row 2 -->
      <line x1="5" y1="58" x2="195" y2="58" stroke="#ddd" stroke-width="1"/>
      <path d="M 12,66 L 15,69 L 20,63" fill="none" stroke="#FF6F47" stroke-width="1.5"/>
      <rect x="35" y="64" width="25" height="4" fill="#ccc" rx="1"/>
      <rect x="70" y="64" width="110" height="4" fill="#ccc" rx="1"/>
      
      <!-- Row 3 -->
      <line x1="5" y1="76" x2="195" y2="76" stroke="#ddd" stroke-width="1"/>
      <line x1="14" y1="84" x2="18" y2="84" stroke="#aaa" stroke-width="1.5"/>
      <rect x="35" y="82" width="18" height="4" fill="#ccc" rx="1"/>
      <rect x="70" y="82" width="80" height="4" fill="#ccc" rx="1"/>
      
      <!-- Row 4 -->
      <line x1="5" y1="94" x2="195" y2="94" stroke="#ddd" stroke-width="1"/>
      <path d="M 12,102 L 15,105 L 20,99" fill="none" stroke="#FF6F47" stroke-width="1.5"/>
      <rect x="35" y="100" width="22" height="4" fill="#ccc" rx="1"/>
      <rect x="70" y="100" width="100" height="4" fill="#ccc" rx="1"/>
      
      <!-- Row 5 -->
      <line x1="5" y1="112" x2="195" y2="112" stroke="#ddd" stroke-width="1"/>
      <path d="M 12,120 L 15,123 L 20,117" fill="none" stroke="#FF6F47" stroke-width="1.5"/>
      <rect x="35" y="118" width="20" height="4" fill="#ccc" rx="1"/>
      <rect x="70" y="118" width="85" height="4" fill="#ccc" rx="1"/>
      
      <!-- Row 6 -->
      <line x1="5" y1="130" x2="195" y2="130" stroke="#ddd" stroke-width="1"/>
      <line x1="14" y1="138" x2="18" y2="138" stroke="#aaa" stroke-width="1.5"/>
      <rect x="35" y="136" width="24" height="4" fill="#ccc" rx="1"/>
      <rect x="70" y="136" width="95" height="4" fill="#ccc" rx="1"/>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- WINDOW 4: AI Agent (Bottom-Right)          -->
  <!-- ========================================== -->
  <g id="window-ai-agent">
    <!-- Casing Top -->
    <polygon points="450,420 588.6,340 576.6,333 438,413" fill="#e8e8e8" stroke="#888" stroke-width="1" stroke-linejoin="round"/>
    <!-- Casing Left -->
    <polygon points="450,420 438,413 438,543 450,550" fill="#d8d8d8" stroke="#888" stroke-width="1" stroke-linejoin="round"/>
    
    <!-- Front Face -->
    <g transform="matrix(0.866, -0.5, 0, 1, 450, 420)">
      <rect width="160" height="130" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1"/>
      <!-- Header -->
      <path d="M0,4 Q0,0 4,0 L156,0 Q160,0 160,4 L160,22 L0,22 Z" fill="#e8e8e8"/>
      <line x1="0" y1="22" x2="160" y2="22" stroke="#888" stroke-width="1"/>
      <circle cx="12" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <circle cx="22" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <circle cx="32" cy="11" r="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <text x="45" y="15" font-family="sans-serif" font-size="10" fill="#272727" font-weight="bold">AI Agent</text>
      
      <!-- Content: Chat Bubbles -->
      <!-- Bubble 1 (Left) -->
      <rect x="10" y="35" width="90" height="22" rx="6" fill="#e0e0e0"/>
      <rect x="18" y="42" width="60" height="3" fill="#aaa" rx="1"/>
      <rect x="18" y="49" width="40" height="3" fill="#aaa" rx="1"/>
      
      <!-- Bubble 2 (Right) -->
      <rect x="50" y="65" width="100" height="22" rx="6" fill="#FF6F47"/>
      <rect x="58" y="72" width="70" height="3" fill="#fff" rx="1" opacity="0.9"/>
      <rect x="58" y="79" width="50" height="3" fill="#fff" rx="1" opacity="0.9"/>
      
      <!-- Bubble 3 (Left) -->
      <rect x="10" y="95" width="75" height="22" rx="6" fill="#e0e0e0"/>
      <rect x="18" y="102" width="45" height="3" fill="#aaa" rx="1"/>
      <rect x="18" y="109" width="25" height="3" fill="#aaa" rx="1"/>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- PERSON FIGURES                             -->
  <!-- ========================================== -->
  
  <!-- Person 1: R&D -->
  <g transform="translate(320, 260)">
    <use href="#person" />
    <text x="0" y="22" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#555" font-weight="bold">R&amp;D</text>
  </g>

  <!-- Person 2: Production -->
  <g transform="translate(620, 300)">
    <use href="#person" />
    <text x="0" y="22" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#555" font-weight="bold">Production</text>
  </g>

  <!-- Person 3: Aftersales -->
  <g transform="translate(280, 420)">
    <use href="#person" />
    <text x="0" y="22" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#555" font-weight="bold">Aftersales</text>
  </g>

  <!-- Person 4: Management -->
  <g transform="translate(680, 480)">
    <use href="#person" />
    <text x="0" y="22" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#555" font-weight="bold">Management</text>
  </g>

</svg>