    <text class="text-small dark" transform="matrix(0.866, 0.5, 0, 1, 32, 218)">DATABASE CONNECTION</text>
    <!-- Bar 4 -->
    <path class="orange" d="M 30 225 L 190 130 L 190 140 L 30 235 Z" />
    <text class="text-small" transform="matrix(0.866, 0.5, 0, 1, 195, 130)">97</text>
    <text class="text-small dark" transform="matrix(0.866, 0.5, 0, 1, 32, 233)">DATABASE CONNECTION LOST</text>
    <!-- Bar 5 -->
    <path class="orange" d="M 30 240 L 190 145 L 190 155 L 30 250 Z" />
    <text class="text-small" transform="matrix(0.866, 0.5, 0, 1, 195, 145)">97</text>
